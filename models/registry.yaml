# Model Registry — all specialist doctor LLMs
# Each entry defines a trained model, its vLLM serving config, and metadata.
# Status: training | ready | serving

specialists:
  - id: pediatrician
    name: "PediatricianGemma"
    specialty: "Pediatrics"
    description: "Specialist in child and adolescent medicine: neonatal care, developmental milestones, vaccinations, congenital conditions, pediatric emergencies"
    base_model: "google/gemma-4-31b-it"
    trained_model_path: "/home/ubuntu/dgxsparkfinetune/output/pediatrician_gemma/final_model/merged_model"
    nvfp4_model_path: "/home/ubuntu/dgxsparkfinetune/output/pediatrician_gemma_nvfp4"
    training_data: "/home/ubuntu/medAI/pediatrics_50k.parquet"
    training_samples: 50000
    status: training          # training | ready | serving
    vllm_port: 8101
    max_model_len: 8192
    gpu_memory_utilization: 0.85
    system_prompt: |
      You are PediatricianGemma, a specialist AI assistant trained on 50,000 pediatric
      medical cases covering neonatal care, child development, vaccinations, congenital
      conditions, pediatric emergencies, and adolescent medicine.
      Provide detailed, clinically accurate answers. Always recommend consulting a licensed
      physician for actual medical decisions. When discussing medications, include
      weight-based pediatric dosing where applicable.

